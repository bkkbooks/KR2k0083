body:
  text: 南嶽小録地理類六山水之屬提要臣等謹案南嶽小録一卷唐道士李沖昭撰卷首有自序稱弱年悟道近嵗依師洎臨嶽門頻訪靈迹遍閲古碑及衡山圖經湘中記仍致詰於師資長者嶽下耆年或得一事旋貯篋笥撮而直書總成一卷案書中有咸通年號當作於懿宗以後序末所題壬戌嵗蓋昭宗之天復二年也舊唐書經籍志新唐書藝文志皆不著録獨鄭樵藝文略有其書與此本卷數相合惟沖昭作仲昭蓋𫝊刻之誤書中先列五峯三澗次敘宫觀祠廟壇院之屬而以厯代得道飛升之迹附之雖黃冠自張其教不無夸誕之詞而唐世名山洞府之書如盧鴻嵩山記張密廬山雜記令狐見堯玉笥山記杜光庭武夷山記今並無存此獨以舊本流𫝊勝境靈跡足資掌故是亦考圖經者所宜徵據矣此本為明蔡汝楠守衡州時所刻前有小引亦謂載事蹟名物悉與今本不同云乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀南嶽小録原序汝楠為郎時雅願乞山水郡治之第乞則不能也竟聽除歸德自歸德持服免歸三年謁除斯可以請遂領衡州守南嶽比至衡吏事填委三月弗暇登嶽忽憶蘇子有云天畀我以形使我以心馭也適秦適越其誰我禦心且不能馭形而况馭人乎遂命輕車上祝融峯遍南嶽觀焉頗謂能馭形而快心獨按山經并記舊聞搜覽遺志大抵磨滅則又嘆曰古今變態陵谷不常煙雲洞霄之府或曽為荆棘瓦礫之場何固求之為憩南臺賦詩凡八章而還然性好古意終不釋也滿秩後謁分守監泉卜先生以小録授汝楠汝楠閲過纂者乃唐人道流彼徒志夫黃冠紫籙之宇錫豫褒勑之榮至於治水所經髙賢所憩其他關乎方輿者弗記也獨其事蹟名物嶽峯泉澗悉與今本不相合且傳之以屬好事抑尚有藏之山中者或繼此而出同僚諸君欣然校而梓之嗚呼登髙覽賦之大夫名山栖跡之君子舉無所徴焉典籍失而求之野此編之傳也固宜嘉靖壬子秋七月德清蔡汝楠序欽定四庫全書南嶽小録唐李冲昭撰冲昭弱年悟道近歲依師洎臨嶽門頻訪靈跡唯求古來舊記希窮勝異之事莫之有者咸云兵火之後其文散失遂遍閲古碑及衡山圖經湘中記仍致詰於師資長者嶽下耆年或得一事旋貯篋笥今據所得上有五峯三澗古來宫觀藥院至于歷代得道飛升之流靈異之端撮而直書總成一卷目為南嶽小録庶道侶遊山得之披覽粗知靈跡之所自云時壬戌歲冬十月序叙嶽南嶽者周禮職方氏曰南嶽之鎮曰衡以其分當翼軫光輔紫宸鈐三氣之根鈞五靈之德上列注生之宿下符長育之功稱物平施故謂之衡山五嶽真形圖云潜霍廬麻玉笥洞陽小僞九嶷羅浮等十山為之佐命復有神仙聖境曰朱陵洞洞天也又云山稟靈氣時有異人又福庭志云朱陵之天周環七百里七十大峯有五小峯有二壇露光青玉學道居此度世上升又青玉壇洞靈源光天壇悉是福地五嶽作鎮皆有高真統治蓋以導雲雨養萬物惠群生者也五峯祝融峯紫蓋峯雲密峯天柱峯石廩峯祝融峯去地髙九千七百八十丈在諸峯之北最髙擁諸峯而直上有祝融廟基及青玉壇光天壇白璧壇雷公池風穴仙梨樹上清院基峯之東南有李泌書堂紫蓋峯去地髙四千五百丈九尺其形嵳峩有似麾蓋因以為名上有仙人池七真閣下有紫蓋院基王氏藥堂雲密峯昔夏禹治水登此峯立碑紀其山髙下丈尺皆科斗文字近代樵人或有遇者其碑至靈隱而不見又有禹溪及隱真平斷石源朱陵洞丹崖仙人石室存焉天柱峯其形似柱因以為名亦名柱括峯下有魏夫人石壇或云魏夫人在此處得道石廩峯逺望如倉廩其上方闊十丈傳云旁通洞府昔有洞門觀胡浮先生常乘白豹遊之又有小石廩峯下有舜廟又有華蓋岣嶁擲鉢回雁皆小峯之數三澗靈澗夀澗洞真澗靈澗以其通於仙源而多靈藥是有其名出紫蓋峯西逾聖夀觀合夀澗南下嶽觀分注平野又有洞真澗司天霍王廟司天霍王廟在嶽觀前去觀百餘步本以南方屬火配神曰祝融𤣥宗封為司天王以配夏享有廟令司人本廟在祝融峯上隋代遷移廢華藪觀而建立今祝融峯頂有古廟基存焉真君廟真君廟在嶽觀之東五十餘步本與司天王同廟各殿開元中司馬天師上言五嶽洞天各有上真所治不可以血食之神同其雩祀既協聖㫖爰創清廟是嶽也啓夏之際潔齊致醮兼度道士五人長備焚修灑掃即開元十五年五月十五日明制也五靈經云佐治者九人從吏三百人羽衛官三萬人為國家祈真請命之地上真記云太虛真人領南嶽司命即炎老君也潜山真人鮑君副治霍山真人韓君佐治金華真人黃君初平天柱真人左君元放南霍真人鄭君思逺霍林真人許君映丹霍真人周君陽紫虛元君魏夫人華存並居佐命之曹吳越楚蜀之㑹皆當司察之衡嶽觀衡嶽觀在華蓋峯卞按舊碑晉太康八年徐真人靈期鄧真人郁之建置梁天監二年周真人靜真再加𢎞葺武帝賜三百戶莊田充基業至隋大業八年詔請蔡天師法濤李天師法超住觀焚修興行教法衡州府庫田疇什物竝賜觀資用唐貞觀二年太宗重書額請張天師惠朗度道士四十九人為國焚修髙宗𢎞道元年請葉天師法善封嶽辟方四十里充宫觀長生之地禁樵採斷畋獵罷獻琛以為常典觀內有田先生得道降真堂劉天師真堂後有尹真人上升壇其觀碑文隋學士曹憲撰今見存焉招仙觀招仙觀按舊碑文曰肇基劉宋分宇蕭齊又别傳晉咸亨間徐真人建置至齊元興元年七月二日有住持升𤣥道士張曇要乘鶴白日冲天其夜雷電激吼天地震動今觀後約一里地有朝天香壇存焉唐貞觀二年蕭天師靈護廬陵人時在嶽招仙觀亂後荒凉天師素能㸃化之術遂㸃化黃白之物投外藩轉錢物而創觀宇不數年克致完合貞觀五年建尋真閣九真觀九真觀按碑文晉太康中鄧真人建置徐真人祠唐開元年中有王天師仙喬初天師為行者道性冲昭有非常之志因將嶽中茶二百餘串直入京國每携茶器於城門內施茶忽一日遇髙力士見而異之問其所來乃曰某是南嶽行者今為本住九真觀殿宇破落特將茶來募施主耳於是力士上聞𤣥宗召見嘉歎久之問曰爾有願否對曰願鬱鬱家國盛濟濟經道興上深加禮焉俾於內殿披度厚與金帛建置令歸嶽中修創觀宇不數年而完全道行逾高聲流上國尋有詔命封為天師乾元二年三月三十日得道又有薛天師季昌本綿州綿竹縣尉在京捨官入道志操不群將歸南嶽上聞𤣥宗𤣥宗嘉之亦厚頒金帛上命筆賦詩送贈有序曰錬師初解簮裾栖心衡嶽及登道録慨然來茲願歸舊居以守虛白不違雅志且重精修忽遇靈藥至人時來城闕也乃賦詩一首寵行云爾詩曰洞府修真客衡陽念舊居將申金闕要願奉玉清書雲路三天近松溪萬籟虛猶期傳祕籙來往候仙輿後封天師天師又師司馬天師𤣥宗禮重呼為道兄凡是觀中什物多是恩賜臨行又贈金器一百事銀器二百事綿帛至多皆有御札天師以乾元二年二月六日得道自離亂後焚燒蕩然雖重修舍宇竟未完復唯存恩賜鍾一口重四千斤咸通中有王尊師名因節住持道行出衆營葺至多聲達京師為王侯所重今在北嶽封總教大師觀後有白雲先生藥堂又有一小池名甘泉其泉味甘煎茶似乳舊日亦有甘泉院西靈觀西靈觀按圖經云梁天監五年建置本女真住持經兵火後未暇修營西有魏夫人仙壇開元中有女真薛師在觀得道又於晨溪别搆道院每出入常有白豹隨行遊歷洞府薛天師常詣之不與相見後不知所之聖夀觀聖夀觀本靈夏盧尚書名藩書堂以咸通六年抗表奏捨為聖壽觀觀內盧公真堂壇殿儼然又有層崖峭壁修竹茂松澗水潺湲風景甚異九仙宫九仙宫本張真人名始珍所居有石壇方闊丈餘梁天監三年有仙者八人迎張真人於石壇上同升天去咸通九年衡州刺史史覿奏置宫額十年十月敕下宜依所奏行之中宫中宫本梁朝王真人靈輿修行上升之處又大厯年李得琳先生居之得道元陽宫元陽宫本晉朝陳真人興明修行上升之處上清宫上清宫本徐真人靈期修行上升之處大厯七年有𤣥和先生張太空居之得道又大中元年韓威儀居之得道紫虛閣紫虛閣有魏夫人仙壇高一丈二尺上圓平約闊一丈亦名飛流壇傳云夫人自撫州乘龍飛來至此夫人晉太尉舒之女諱華存號上真紫虛元君有臺閣儀像儼然又云晉咸和年於此修道又北去半里有神溪投龍潭每修齊畢投金龍於此石室隱真宫石室隱真宫大厯年中廣成劉先生𤣥靜修行之處行三五步岡奪虎穴而居之名曰隱真宫刺史韓臯出俸錢為創㑹真閣初先生在兹十五年餘修道莫有知者時因太史占之云有真人星見隱者在兹嶽得道應於天文上聞武宗武宗遽降詔命委本道監軍使遣人齎詔徴召使人到嶽遍尋無所不至忽一日中使人行及中宫西南面三里餘歷嶮攀蘿見一石室深邃屈曲有住之家於是擘藤蘿入深乃見先生凝然而坐中使宣命先生初乃佯狂後即承命尋赴闕庭詔封為帝師號廣成先生却復兹地未幾而羽化今石室有昔時鐫石為醮壇天寶臺碓磑罌缶碁局茶竈燈臺皆就石而琢成之今悉存焉凌虛臺凌虛臺昔有薛天師季昌周尊師混相次居之得道洞靈臺洞靈臺本李天師明俊居之得道亦是福地添香臺添香臺昔有女真居之得道今臺及聖境存焉劉根先生藥巖劉根先生藥巖昔有仙人劉根居之修行之所在九仙宫之西北頗甚深邃亦殊異之境也紫蓋院紫蓋院昔有道人建置亂後唯基址存焉白雲先生藥堂白雲先生藥堂在九真觀西開元中司馬天師承正本號白雲先生後授真一先生嘗於此修行尹真人壇尹真人壇在嶽觀北百餘步真人諱道全上升之處田先生藥巖田先生藥巖在中宫東面百餘步先生諱良逸元和中修行於此後得道北帝院北帝院在嶽觀東北去觀三里昔有女真侯鍊師居之修行勤於香火後亦得道洞真瀑布洞真瀑布在招仙觀北去觀三里瀑布如簾垂及亭臺碑文紀其勝異上有朝天壇昔日張真人曇要上升之處又下有投龍潭每修齊畢投金龍於此也王氏藥院王氏藥院咸通間有術士王生居之有茂松修竹流水周繞及多棐樹茶園今基址存焉光天觀光天觀傳云融峯院是觀基隱真平隱真平在雲密峯之中坦然而平方闊五里是神仙遨遊之所時人尋之少有到者斷石源斷石源在隱真平水源有石髙數丈闊數尺而中斷上有鐫字云此有丹砂水如乳而甘香有人得掬飲之可夀至千歲尋遊者到此間唯聞石下有流水之聲在左邊聽即落右邊在右邊聽即落左邊罕有得者朱陵洞朱陵洞即三茅洞天在九仙宫正西三里有石巖下有平石方二丈是舊時投金簡之所傳云朱陵洞之東門也前代九真人出九仙宫碑舊有九仙殿陳真人興明居元陽宫晉武帝大始元年三月一日上升胡浮先生姓施名存居洞門觀西峯搆虛閣晉惠帝永康九年四月上升尹真人道全居嶽觀溪晉懷帝元嘉元年正月九日上升徐真人靈期居上清宫宋元徽二年九月九日上升陳真人惠度居古玉清宫齊武帝永明二年五月十三日上升張真人曇要居招仙觀齊延興元年七月三日上升張真人始軫居九仙宫梁天監三年七月十三日上升王真人靈輿居中宫梁天監十一年七月十三日上升鄧真人郁之字𤣥寂居洞門觀梁天監十年十二月三十日上升又有雙襲祖雙子辨二人相次得道唐朝得道人在嶽一十四人殷先生景童天寶十七年七月三日得道蕭先生靈護𢎞道三年八月十五日得道李天師思慕天寶十四年八月二十六日得道何尊師隱其名天寶二年十月十五日得道薛天師季昌乾元二年二月六日得道王天師仙喬乾元二年三月三十日得道傅天師待仙乾元三年十一月七日得道董先生秦仙大厯元年十一月六日得道𤣥和張先生太空大厯七年二月八日上清宫得道李先生德琳大厯十二年九月五日中宫得道田先生良逸元和六年正月七日在降真院得道廣成劉先生𤣥靜大中五年五月十一日得道周尊師混汙㑹昌二年正月得道韓威儀大中元年上清宫得道田先生有弟子陳徴君馮徴君張徴君三人不就徴皆於天台山相次得道真君傳漢中壘校尉劉向撰赤松子者神農時雨師也服水玉以教神農能入火自燒數往崑崙山中常止西王母石室中隨風雨上下炎帝少女追之亦得俱去至髙辛時復為雨師焉王母者神人之面蓬髮戴勝虎爪善嘯巖居名王母在崑崙之墟焉讃曰渺渺赤松飄飄少女接手翻飛泠然雙舉縱身長風俄翼𤣥圃妙達坎巽作範司雨田先生寫真讃蒙谷子諸葛黃撰田先生實衡之佚民間世所出天然真氣生而知道醇孝養親得混朴自然之理言貌不飾裘褐垢弊侯王禮重我亦不榮氓𨽻紿輕我亦不陋驅役鬼神意往即至一入衡嶽踰五十年九百門人皆是軒冕請為法主一作帝師廣成先生是也即先生之道其可知也儀形可質圖寫存焉自始及今未有稱述黃承其闕序以讃云靈根獨秀真人間生仙非積學道乃天成汪汪德貌落落神情兹形如在猶可作程
